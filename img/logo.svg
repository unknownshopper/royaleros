<svg width="520" height="240" viewBox="0 0 520 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glow sutil -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .bg { fill: #0A0F0D; }

    .text {
      font-family: 'JetBrains Mono', monospace;
      fill: #00E676;
      letter-spacing: 3px;
      filter: url(#softGlow);
    }

    .olmeca {
      font-size: 52px;
      font-weight: 500;
    }

    .code {
      font-size: 64px;
      font-weight: 700;
    }

    .cursor {
      animation: blink 1.1s steps(1) infinite;
    }

    .c1, .c2, .c3, .c4 {
      opacity: 1;
      animation-duration: 8.8s;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    .c1 { animation-name: typeC1; }
    .c2 { animation-name: typeC2; }
    .c3 { animation-name: typeC3; }
    .c4 { animation-name: typeC4; }

    /*
      Timeline (8.8s):
      - 0%..37.5%: hold (≈ 3 parpadeos)
      - 37.5%..50%: borrar
      - 50%..62.5%: escribir
      - 62.5%..100%: hold (≈ 3 parpadeos)
    */

    @keyframes typeC1 {
      0%, 49% { opacity: 1; }
      49.1%, 52% { opacity: 0; }
      52.1%, 100% { opacity: 1; }
    }

    @keyframes typeC2 {
      0%, 46% { opacity: 1; }
      46.1%, 55% { opacity: 0; }
      55.1%, 100% { opacity: 1; }
    }

    @keyframes typeC3 {
      0%, 43% { opacity: 1; }
      43.1%, 58% { opacity: 0; }
      58.1%, 100% { opacity: 1; }
    }

    @keyframes typeC4 {
      0%, 40% { opacity: 1; }
      40.1%, 61% { opacity: 0; }
      61.1%, 100% { opacity: 1; }
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>

  <rect width="100%" height="100%" class="bg"/>

  <text x="260" y="95" text-anchor="middle" class="text olmeca">
    OLMECA
  </text>

  <text x="260" y="170" text-anchor="middle" class="text code">
    <tspan class="c1">c</tspan><tspan class="c2">o</tspan><tspan class="c3">d</tspan><tspan class="c4">e</tspan>
  </text>

  <text x="260" y="170" text-anchor="middle" class="text code cursor" transform="translate(34 0)">_ 
    <animateTransform
      attributeName="transform"
      attributeType="XML"
      type="translate"
      dur="8.8s"
      repeatCount="indefinite"
      calcMode="discrete"
      additive="sum"
      values="66 0;66 0;33 0;0 0;-33 0;-66 0;-66 0;-33 0;0 0;33 0;66 0;66 0"
      keyTimes="0;0.375;0.40;0.43;0.46;0.49;0.52;0.55;0.58;0.61;0.625;1" />
  </text>
</svg>